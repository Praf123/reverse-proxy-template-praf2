events {}

http {
  # Upstream: your IPTV IPv4 (use port 80)
  upstream web0_upstream { server 104.18.26.57:80; }
  upstream web1_upstream { server 104.18.26.57:80; }
  upstream web2_upstream { server 104.18.26.57:80; }
  upstream web3_upstream { server 104.18.26.57:80; }

  server {
    listen 80;
    server_name remoteguru.cc;

    location = /health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    location / {
      proxy_pass http://web0_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      proxy_buffering off;
    }
  }

  server {
    listen 80;
    server_name site1.remoteguru.cc;

    location / {
      proxy_pass http://web1_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      proxy_buffering off;
    }
  }

  server {
    listen 80;
    server_name site2.remoteguru.cc;

    location / {
      proxy_pass http://web2_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      proxy_buffering off;
    }
  }

  server {
    listen 80;
    server_name site3.remoteguru.cc;

    location / {
      proxy_pass http://web3_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      proxy_buffering off;
    }
  }
}
